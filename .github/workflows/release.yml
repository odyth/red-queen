name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.1 or 0.1.1-rc.1 — no 'v' prefix needed)"
        required: true
        type: string

permissions:
  contents: write     # create GitHub releases, push version-bump commit
  id-token: write     # npm OIDC trusted publishing

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize and validate version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z or X.Y.Z-suffix)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
            echo "prerelease_flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag does not already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ steps.version.outputs.tag }}$"; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists on origin"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run check
      - run: npm run test:ci

      - name: Bump package.json
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Stamp CHANGELOG date
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          sed -i "s|^## \[${{ steps.version.outputs.version }}\] - YYYY-MM-DD|## [${{ steps.version.outputs.version }}] - $TODAY|" CHANGELOG.md

      - run: npm run build

      - name: Commit version bump and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit (version already set and CHANGELOG already dated)"
          else
            git commit -m "release: ${{ steps.version.outputs.version }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish to npm
        run: npm publish --provenance --access public --tag ${{ steps.version.outputs.dist_tag }}

      - name: Pack tarball for release attachment
        run: npm pack

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            ${{ steps.version.outputs.prerelease_flag }} \
            "redqueen-${{ steps.version.outputs.version }}.tgz"
