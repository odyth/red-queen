name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write     # create GitHub releases
  id-token: write     # npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Validate tag format
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag v$VERSION does not look like a SemVer version" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm run check
      - run: npm run test:ci
      - run: npm run build

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json $PKG" >&2
            exit 1
          fi

      - name: Determine dist-tag
        id: disttag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - run: npm publish --provenance --access public --tag ${{ steps.disttag.outputs.tag }}

      - name: Extract CHANGELOG section
        id: changelog
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading "v" from refs/tags/vX.Y.Z for the CHANGELOG heading match.
          VERSION="${VERSION#v}"
          # Stamp today's date into the heading if it still has the YYYY-MM-DD placeholder.
          TODAY="$(date -u +%Y-%m-%d)"
          sed -i "s|^## \[$VERSION\] - YYYY-MM-DD|## [$VERSION] - $TODAY|" CHANGELOG.md
          # Literal-string header match via awk -v — no shell interpolation into the awk program.
          awk -v header="## [$VERSION]" '
            index($0, header) == 1 { flag = 1; next }
            /^## \[/ { flag = 0 }
            flag
          ' CHANGELOG.md > RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          PRERELEASE=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file RELEASE_NOTES.md \
            --draft \
            $PRERELEASE
